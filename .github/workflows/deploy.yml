name: Live Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 82.112.232.206
          username: u477483561
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./
          server-dir: /domains/slysis.com/public_html/master/
          state-name: .ftp-sync-state.json
          dangerous-clean-slate: false
          timeout: 900000          # 🟢 FIX 1: Connection timeout ko badha diya taaki crash na ho
          log-level: verbose       # 🟢 FIX 2: Agar koi file atke toh logs mein saaf dikhe
          exclude: |
            **/.git/**
            **/.git*
            **/.github/**
            **/.vscode/**
            **/node_modules/**
            **/tests/**
            **/vendor/**
            **/system/**
            **/writable/cache/** # 🟢 FIX 3: Poora writable block nahi kiya, sirf cache, logs aur session ko roka hai
            **/writable/logs/**
            **/writable/session/**
            **/writable/debugbar/**
            **/.env
            **/*.log