name: Live Deploy
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy with lftp
        run: |
          sudo apt-get install lftp -y
          lftp -u u477483561,${{ secrets.FTP_PASSWORD }} 82.112.232.206 <<EOF
          set ftp:ssl-allow no
          mirror -R --only-newer --verbose \
            --exclude-glob .git \
            --exclude-glob .github \
            --exclude-glob .vscode \
            --exclude-glob vendor \
            --exclude-glob writable \
            --exclude-glob system \
            ./ /public_html/master/
          bye
          EOF